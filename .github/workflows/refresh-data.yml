name: Refresh AFL data

# Fetches the current AFL season, rebuilds players.json (+ best-effort worm,
# lineups, livestats, honours), and commits the updated JSON to THIS repo.
#
# This repo hosts both the data and the pipeline, so publishing is just a commit
# to itself via the built-in GITHUB_TOKEN — no personal access token required.
# By default it fetches only the CURRENT season and merges it into the existing
# data (historical seasons never change), so each run makes a fraction of the API
# calls. Use the "full" input to re-fetch every season (2012 -> current).

on:
  schedule:
    - cron: '0 20 * * *' # daily, 20:00 UTC (early-morning AEST/AEDT)
  workflow_dispatch:
    inputs:
      full:
        description: 'Full rebuild (re-fetch ALL seasons) instead of the fast current-season merge'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Posit binary packages — fast, no compilation

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::fitzRoy
            any::readr
            any::dplyr

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch + build players.json
        env:
          DATA_URL: https://raw.githubusercontent.com/PortParkStudios/afl-radar-data/main/players.json
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            echo "Full re-fetch — every CD season (stats + bios), MERGED onto hosted."
            # Re-fetch all Champion Data seasons (2012 -> current) and MERGE, not a
            # standalone build. A standalone rebuild would drop the pre-2012
            # `historical` rows (from AFL Tables, which isn't fetched in CI and
            # segfaults locally) — merge keeps them while re-enriching 2012+.
            Rscript scripts/afl/fetch_afl.R
            Rscript scripts/afl/fetch_details.R
            node scripts/afl/build-players.mjs --json players.json --out none --merge "$DATA_URL" --min-games 1
          else
            YEAR=$(date -u +%Y)
            echo "Incremental — fetching $YEAR only (stats + bios), merging into hosted data."
            Rscript scripts/afl/fetch_afl.R "$YEAR" "$YEAR"
            Rscript scripts/afl/fetch_details.R "$YEAR" "$YEAR"
            node scripts/afl/build-players.mjs --json players.json --out none --merge "$DATA_URL" --min-games 1
          fi

      - name: Validate players.json (fail-loud — never publish broken core data)
        # A broken/empty players.json would take the live app down, so this gate
        # FAILS the run (nothing publishes) rather than shipping bad core data.
        run: |
          node -e '
            const d = JSON.parse(require("fs").readFileSync("players.json", "utf8"));
            const rows = (d.players || []).length;
            const cur = new Date().getUTCFullYear();
            const maxSeason = Math.max(0, ...(d.players || []).map((p) => p.season));
            if (!d.version) { console.error("::error::players.json missing version field"); process.exit(1); }
            if (rows < 5000) { console.error(`::error::players.json only ${rows} rows (<5000)`); process.exit(1); }
            if (maxSeason < cur - 1) { console.error(`::error::players.json latest season ${maxSeason} looks stale (< ${cur - 1})`); process.exit(1); }
            console.log(`players.json OK — ${rows} rows, latest season ${maxSeason}, version ${d.version}`);
          '

      - name: Build score worm (recent/live rounds)
        # AFL score-progression for the current + last round. Best-effort: a worm
        # failure must never block the players.json refresh.
        run: |
          Rscript scripts/afl/fetch_worm.R || echo "worm fetch failed — skipping worm"
          if [ -f scripts/afl/worm_raw.csv ]; then
            node scripts/afl/build-worm.mjs || echo "worm build failed — skipping worm"
          fi

      - name: Build team sheets (recent/current rounds)
        # AFL named lineups for recent + current + next round. Best-effort.
        run: |
          Rscript scripts/afl/fetch_lineup.R || echo "lineup fetch failed — skipping lineups"
          if [ -f scripts/afl/lineup_raw.csv ]; then
            node scripts/afl/build-lineup.mjs || echo "lineup build failed — skipping lineups"
          fi

      - name: Build live player stats (latest round)
        # Reuses afl_raw.csv from the fetch step above — no extra AFL API calls.
        # Best-effort.
        run: |
          if [ -f scripts/afl/afl_raw.csv ]; then
            node scripts/afl/build-livestats.mjs --rounds 1 || echo "livestats build failed — skipping"
          else
            echo "no afl_raw.csv — skipping livestats"
          fi

      - name: Build per-game logs export (deep history)
        # One row per player per match, ALL seasons -> gamelogs.csv (training /
        # deep-history dataset; too big for players.json, which keeps only 2
        # seasons of per-game logs). Reuses afl_raw.csv — no extra AFL API calls.
        # Full rebuild rewrites every season; the daily incremental MERGES only the
        # current season (afl_raw.csv holds just the current season) and keeps the
        # backfilled history. Best-effort.
        run: |
          if [ -f scripts/afl/afl_raw.csv ]; then
            if [ "${{ inputs.full }}" = "true" ]; then
              node scripts/afl/build-gamelogs.mjs || echo "gamelogs build failed — skipping"
            else
              node scripts/afl/build-gamelogs.mjs --merge || echo "gamelogs build failed — skipping"
            fi
          else
            echo "no afl_raw.csv — skipping gamelogs"
          fi

      - name: Refresh AFLCA coaches votes
        # Unlike the once-a-year Brownlow/AA/Rising CSVs, coaches votes ACCUMULATE
        # every round and publish live-weekly — so they refresh on THIS daily
        # cadence. Full rebuild re-fetches every season; the daily incremental
        # refreshes only the current season and MERGES (keeps prior seasons in the
        # committed CSV). Best-effort: a votes failure must not block the refresh.
        run: |
          YEAR=$(date -u +%Y)
          if [ "${{ inputs.full }}" = "true" ]; then
            Rscript scripts/afl/fetch_coaches_votes.R 2013 "$YEAR" || echo "coaches votes fetch failed — skipping"
          else
            Rscript scripts/afl/fetch_coaches_votes.R "$YEAR" "$YEAR" || echo "coaches votes fetch failed — skipping"
          fi

      - name: Build honours
        # Matches the honours CSVs (Brownlow/AA/Rising Star committed once a year;
        # coaches votes refreshed above) to players -> honours.json. Cheap.
        run: |
          if [ -f scripts/afl/honours_brownlow.csv ] || [ -f scripts/afl/honours_aa.csv ] || [ -f scripts/afl/honours_coaches.csv ]; then
            node scripts/afl/build-honours.mjs --players players.json || echo "honours build failed — skipping"
          else
            echo "no honours CSVs committed — skipping honours"
          fi

      - name: Build rating weights (precompute)
        # Fit the 7 per-role rating models from players.json + honours.json so the
        # app skips the ~10s on-device fit. Version-stamped to match players.json.
        # Loud but non-blocking: a bad/failed build is annotated + dropped (the app
        # falls back to on-device), never stalling the players.json publish.
        run: |
          if node scripts/afl/build-weights.mjs --players players.json --honours honours.json --out weights.json; then
            node -e '
              const w = JSON.parse(require("fs").readFileSync("weights.json", "utf8"));
              const p = JSON.parse(require("fs").readFileSync("players.json", "utf8"));
              const roles = Object.keys(w.weights || {});
              if (roles.length !== 7) { console.error(`::error::weights.json has ${roles.length} roles (!=7)`); process.exit(1); }
              if (w.version !== p.version) { console.error("::error::weights.json version != players.json"); process.exit(1); }
              console.log(`weights.json OK — 7 roles, version ${w.version}`);
            ' || { echo "::error::weights.json invalid — not publishing"; rm -f weights.json; }
          else
            echo "::error::build-weights failed — not publishing weights.json"; rm -f weights.json
          fi

      - name: Build team stats (precompute)
        # Daily-fresh team per-game presets so the current season isn't frozen to
        # the app's bundled seed. Reuses afl_raw.csv from the fetch step. The seed
        # .ts writes go to a scratch dir that is never published — only team-stats.json.
        run: |
          if [ -f scripts/afl/afl_raw.csv ]; then
            mkdir -p src/data/seed
            if node scripts/afl/build-team-stats.mjs --json team-stats.json --players players.json; then
              node -e '
                const t = JSON.parse(require("fs").readFileSync("team-stats.json", "utf8"));
                const p = JSON.parse(require("fs").readFileSync("players.json", "utf8"));
                const seasons = Object.keys(t.teamStats || {});
                if (!seasons.length) { console.error("::error::team-stats.json has no seasons"); process.exit(1); }
                if (t.version !== p.version) { console.error("::error::team-stats.json version != players.json"); process.exit(1); }
                console.log(`team-stats.json OK — ${seasons.length} seasons, version ${t.version}`);
              ' || { echo "::error::team-stats.json invalid — not publishing"; rm -f team-stats.json; }
            else
              echo "::error::build-team-stats failed — not publishing team-stats.json"; rm -f team-stats.json
            fi
            rm -rf src/data
          else
            echo "afl_raw.csv absent — skipping team-stats"
          fi

      - name: Build awards — All-Australian (precompute)
        # The expensive AA Monte-Carlo only; the Brownlow tally + coaches stay
        # computed on-device (live in-round). Needs weights.json (above) +
        # current-season games via the live proxy. Loud but non-blocking.
        run: |
          if [ -f weights.json ] && [ -f honours.json ]; then
            YEAR=$(date -u +%Y)
            curl -sf -m 30 "https://kickpoint-live.kickpoint.workers.dev/?q=games;year=$YEAR" -o games.json || echo "games fetch failed — neutral win rate"
            if node scripts/afl/build-awards.mjs --players players.json --weights weights.json --honours honours.json --games games.json --out awards.json; then
              node -e '
                const a = JSON.parse(require("fs").readFileSync("awards.json", "utf8"));
                const p = JSON.parse(require("fs").readFileSync("players.json", "utf8"));
                const def = (a.aa?.full?.team || []).find((g) => g.key === "DEF");
                if (!def || def.selected.length !== 6) { console.error("::error::awards.json AA DEF line not 6"); process.exit(1); }
                if (a.version !== p.version) { console.error("::error::awards.json version != players.json"); process.exit(1); }
                console.log(`awards.json OK — AA team present, version ${a.version}`);
              ' || { echo "::error::awards.json invalid — not publishing"; rm -f awards.json; }
            else
              echo "::error::build-awards failed — not publishing awards.json"; rm -f awards.json
            fi
            rm -f games.json
          else
            echo "weights.json/honours.json absent — skipping awards"
          fi

      - name: Commit + push updated data
        # Publishes to THIS repo via the built-in GITHUB_TOKEN (permissions:
        # contents: write). Only the JSON outputs are staged — the regenerated
        # CSV intermediates are gitignored.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add players.json
          [ -f worm.json ] && git add worm.json || true
          [ -f lineups.json ] && git add lineups.json || true
          [ -f livestats.json ] && git add livestats.json || true
          [ -f honours.json ] && git add honours.json || true
          # Coaches votes refresh weekly, so the regenerated CSV is committed too
          # (the once-a-year Brownlow/AA/Rising CSVs are committed manually).
          [ -f scripts/afl/honours_coaches.csv ] && git add scripts/afl/honours_coaches.csv || true
          [ -f scripts/afl/coaches_rounds.csv ] && git add scripts/afl/coaches_rounds.csv || true
          # Deep per-game history export (published training dataset).
          [ -f gamelogs.csv ] && git add gamelogs.csv || true
          # Hosted precompute artifacts (version-stamped to match players.json).
          [ -f weights.json ] && git add weights.json || true
          [ -f team-stats.json ] && git add team-stats.json || true
          [ -f awards.json ] && git add awards.json || true
          if git diff --cached --quiet; then
            echo "No data changes — nothing to publish."
          else
            git commit -m "Refresh data ($(date -u +%F))"
            # Rebase-before-push with retry: the live-refresh loop (and any manual
            # run) can push to main mid-build, so integrate the latest remote and
            # retry. Our freshly-built files win any overlap (-X theirs on rebase).
            pushed=0
            for i in 1 2 3 4 5; do
              if git push; then pushed=1; echo "Published updated data."; break; fi
              echo "Push rejected — rebasing onto remote (attempt $i/5)."
              git pull --rebase -X theirs origin main || { echo "::error::rebase onto remote failed"; exit 1; }
            done
            [ "$pushed" = 1 ] || { echo "::error::push failed after 5 attempts"; exit 1; }
          fi
